<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول مباريات كأس العالم 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-deep: #004d2e;
            --green-mid: #006b3c;
            --gold: #c9a84c;
            --gold-light: #e8d08a;
            --cream: #faf7f0;
            --text-dark: #1a1a1a;
            --text-mid: #444;
            --text-light: #888;
            --radius: 10px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }

        header {
            background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
            color: white; padding: 32px 24px 24px; text-align: center; position: relative; overflow: hidden;
        }
        header::before {
            content: ''; position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
        }
        header .trophy { font-size: 2.8rem; display: block; margin-bottom: 6px; }
        header h1 { font-size: 1.6rem; font-weight: 900; }
        header .subtitle { margin-top: 5px; font-size: 0.9rem; color: var(--gold-light); font-weight: 600; }

        .welcome-strip { background: var(--gold); color: var(--green-deep); text-align: center; padding: 9px 20px; font-size: 0.88rem; font-weight: 700; }

        .page-wrap { max-width: 1140px; margin: 0 auto; padding: 20px 14px 48px; }

        /* FILTER BAR */
        .filter-section { background: white; border: 1px solid #e0e0e0; border-radius: var(--radius); padding: 16px 18px; margin-bottom: 18px; box-shadow: var(--shadow); }
        .filter-title { font-weight: 800; font-size: 0.9rem; color: var(--green-deep); margin-bottom: 12px; }
        .filter-groups { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .filter-groups button, .filter-special button {
            padding: 7px 14px; border: 1.5px solid #d0d0d0; border-radius: 20px;
            font-family: 'Cairo', sans-serif; font-size: 0.82rem; font-weight: 700;
            cursor: pointer; background: white; color: var(--text-mid); transition: all 0.18s;
        }
        .filter-groups button:hover { border-color: var(--green-mid); color: var(--green-mid); }
        .filter-groups button.active { background: var(--green-mid); color: white; border-color: var(--green-mid); }
        .filter-special { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
        .filter-special button { border-color: #c0a84c44; color: #6b5a1e; }
        .filter-special button:hover { border-color: var(--gold); color: #6b5a1e; background: #fffaee; }
        .filter-special button.active { background: var(--gold); color: var(--green-deep); border-color: var(--gold); }
        .filter-continent button { border-color: #1a73e844; color: #1a4a8a; }
        .filter-continent button:hover { border-color: #1a73e8; background: #e8f0fe; color: #1a4a8a; }
        .filter-continent button.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        .filter-row-label { font-size: 0.78rem; color: var(--text-light); font-weight: 700; width: 100%; margin-bottom: 2px; }

        /* TABLE */
        .table-wrap { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; border: 1px solid #e8e8e8; }
        .table-scroll { overflow-x: auto; max-height: 68vh; }
        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 700px; }

        thead tr { background: var(--green-deep); color: white; position: sticky; top: 0; z-index: 10; }
        th { padding: 13px 10px; text-align: center; font-size: 0.82rem; font-weight: 700; white-space: nowrap; border-left: 1px solid rgba(255,255,255,0.1); }
        th:first-child { border-left: none; }
        /* reorder: date first (right), then match, then group (left) */
        th.col-date  { text-align: right; padding-right: 14px; }
        th.col-group { text-align: left; padding-left: 14px; }

        td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #f0f0f0; border-left: 1px solid #f0f0f0; vertical-align: middle; line-height: 1.5; }
        td:first-child { border-left: none; }
        td.col-date { text-align: right; padding-right: 14px; }
        td.col-group { text-align: left; padding-left: 14px; }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #f5faf6; }

        .badge { display: inline-block; padding: 3px 11px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
        .badge-group { background: var(--green-mid); color: white; }
        .badge-knockout { background: var(--gold); color: var(--green-deep); box-shadow: 0 2px 5px rgba(201,168,76,0.3); }

        .date-main { display: block; font-weight: 700; font-size: 0.88rem; }
        .time-main { display: block; font-weight: 600; font-size: 0.85rem; color: var(--green-deep); }
        .late-label { display: block; font-size: 0.72rem; color: #c0392b; font-weight: 600; margin-top: 1px; }

        .match-name { font-weight: 600; font-size: 0.9rem; }

        .countdown { display: block; margin-top: 5px; font-weight: 700; font-variant-numeric: tabular-nums; font-size: 0.78rem; padding: 4px 8px; border-radius: 6px; background: #fff8ed; color: #b5520a; border: 1px solid #ffd99e; white-space: nowrap; }
        .countdown.live { background: #ff3b30; color: #fff; border-color: #c0392b; animation: pulse 1.2s infinite; }
        .countdown.suspended { background: #fff3e0; color: #b5520a; border-color: #ffcc80; }
        .live-score { font-weight: 900; }

        .lineup-btn { display: inline-block; margin-top: 5px; padding: 3px 10px; font-size: 0.72rem; font-weight: 700; border-radius: 6px; border: 1.5px solid var(--green-mid); background: white; color: var(--green-mid); cursor: pointer; font-family: 'Cairo', sans-serif; }
        .lineup-btn:hover { background: var(--green-mid); color: white; }
        .lineup-btn:disabled { opacity: 0.6; cursor: wait; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
        .modal-box { background: white; border-radius: var(--radius); max-width: 480px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 18px; box-shadow: var(--shadow); position: relative; }
        .modal-close { position: absolute; top: 10px; left: 10px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-light); }
        .modal-title { font-weight: 800; color: var(--green-deep); margin-bottom: 10px; font-size: 1rem; text-align: center; }
        .lineup-team { font-weight: 800; margin: 10px 0 4px; color: var(--green-mid); font-size: 0.9rem; }
        .lineup-formation { font-size: 0.78rem; color: var(--text-light); margin-bottom: 6px; }
        .lineup-players { font-size: 0.85rem; line-height: 1.9; }
        .lineup-players span { display: inline-block; background: #f5faf6; border-radius: 6px; padding: 2px 8px; margin: 2px; }

        .row-knockout { background: #fffaee !important; }
        .row-knockout td { border-bottom-color: #f0e6c0; border-left-color: #f0e6c0; }
        .row-knockout:first-of-type td { border-top: 2px solid var(--gold); }

        .result-count { font-size: 0.8rem; color: var(--text-light); padding: 9px 14px; border-top: 1px solid #f0f0f0; text-align: right; }

        /* continent team pills */
        .cont-team-btn { padding: 5px 12px; border: 1.5px solid #1a73e844; border-radius: 20px; font-family: 'Cairo', sans-serif; font-size: 0.8rem; font-weight: 700; cursor: pointer; background: white; color: #1a4a8a; transition: all 0.18s; }
        .cont-team-btn:hover { border-color: #1a73e8; background: #e8f0fe; }
        .cont-team-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        .cont-show-all-btn { padding: 5px 12px; border: 1.5px solid #1a73e888; border-radius: 20px; font-family: 'Cairo', sans-serif; font-size: 0.8rem; font-weight: 700; cursor: pointer; background: #e8f0fe; color: #1a4a8a; transition: all 0.18s; }
        .cont-show-all-btn.active { background: #1a73e8; color: white; }

        @media (max-width: 640px) {
            header { padding: 20px 14px 16px; }
            header .trophy { font-size: 2rem; }
            header h1 { font-size: 1.05rem; }
            header .subtitle { font-size: 0.75rem; }
            .welcome-strip { font-size: 0.78rem; padding: 7px 12px; }
            .page-wrap { padding: 12px 8px 36px; }
            .filter-section { padding: 12px 12px; }
            .filter-groups { gap: 5px; }
            .filter-groups button, .filter-special button { font-size: 0.73rem; padding: 5px 9px; }
            .table-scroll { max-height: 60vh; }
            table { min-width: 0; width: 100%; font-size: 0.8rem; }
            th, td { padding: 9px 7px; font-size: 0.78rem; }
            th.col-date, td.col-date { padding-right: 9px; }
            th.col-group, td.col-group { padding-left: 9px; }
            .match-name { font-size: 0.82rem; }
            .badge { font-size: 0.72rem; padding: 2px 8px; }
            .countdown { font-size: 0.72rem; padding: 3px 6px; }
            .date-main { font-size: 0.8rem; }
            .time-main { font-size: 0.76rem; }
        }
    </style>
</head>
<body>

<div class="welcome-strip">✨ أحمد الزهراني يتمنى لكم فرجة ممتعة ✨</div>

<header>
    <span class="trophy">🏆</span>

            <button onclick="setContinent('oceania',this)">🌏 أوقيانوسيا</button>
        </div>

        <div id="continentTeamsRow" style="display:none; padding-top:10px; border-top:1px solid #f0f0f0; margin-top:8px; flex-wrap:wrap; gap:8px; align-items:center;">
            <div class="filter-row-label" id="continentTeamsLabel">اختر دولة:</div>
        </div>
    </div>

    <div class="table-wrap">
        <div class="table-scroll">
            <table id="matchesTable">

                    <tr>

</div>

let liveData = {}; // key: "team1|team2" -> {status, elapsed, extra, goalsHome, goalsAway, homeIsTeam1, fixtureId}

function matchKey(m) { return m.teams.join('|'); }

async function loadFinalResultsCache() {
    try {
        const r1 = await window.storage.get('finalResults', true);
        if (r1 && r1.value) finalResults = JSON.parse(r1.value);
    } catch (e) { finalResults = {}; }
    try {
        const r2 = await window.storage.get('fetchedDates', true);
        if (r2 && r2.value) fetchedDates = JSON.parse(r2.value);
    } catch (e) { fetchedDates = []; }
}

async function saveFinalResultsCache() {
    try { await window.storage.set('finalResults', JSON.stringify(finalResults), true); } catch (e) {}
    try { await window.storage.set('fetchedDates', JSON.stringify(fetchedDates), true); } catch (e) {}
}

// fetch final scores for past matches whose date hasn't been queried yet (max 2 dates per page load)
async function syncFinishedResults() {
    const now = Date.now();
    const neededDates = [...new Set(
        matches.filter(m => !m.knockout && new Date(m.ast).getTime() < now - 2 * 60 * 60 * 1000)
               .map(astDate)
    )].filter(d => !fetchedDates.includes(d));

    if (neededDates.length === 0) return;

    let changed = false;
    for (const dateStr of neededDates.slice(0, 2)) {
        try {
            const url = `https://${API_HOST}/v3/fixtures?league=${WC_LEAGUE_ID}&season=${WC_SEASON}&date=${dateStr}&timezone=Asia/Riyadh`;
            const res = await fetch(url, { headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST } });
            const data = await res.json();
            (data.response || []).forEach(fx => {
                if (!STATUS_FINISHED.includes(fx.fixture.status.short)) return;
                const home = fx.teams.home.name, away = fx.teams.away.name;
                matches.forEach(m => {
                    if (m.knockout) return;
                    const [t1, t2] = m.teams;
                    const e1 = teamNameMap[t1], e2 = teamNameMap[t2];
                    let g1, g2;
                    if (e1 === home && e2 === away) { g1 = fx.goals.home; g2 = fx.goals.away; }
                    else if (e1 === away && e2 === home) { g1 = fx.goals.away; g2 = fx.goals.home; }
                    else return;
                    finalResults[matchKey(m)] = `${g1} - ${g2}`;
                });
            });
            fetchedDates.push(dateStr);
            changed = true;
        } catch (e) {
            console.error('result sync error for', dateStr, e);
        }
    }
    if (changed) {
        await saveFinalResultsCache();
        render();
    }
}

// returns true if a non-knockout match is close enough to "now" to be worth polling
function shouldPoll() {
    const now = Date.now();
    const WINDOW = 3 * 60 * 60 * 1000; // 3 hours before/after kickoff
    return matches.some(m => {
        if (m.knockout) return false;
        const t = new Date(m.ast).getTime();
        return (t - now) < WINDOW && (now - t) < WINDOW;
    });
}

async function fetchLiveData() {
    try {
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-CA', { timeZone: 'Asia/Riyadh' }); // YYYY-MM-DD
        const url = `https://${API_HOST}/v3/fixtures?league=${WC_LEAGUE_ID}&season=${WC_SEASON}&date=${dateStr}&timezone=Asia/Riyadh`;
        const res = await fetch(url, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST }
        });
        const data = await res.json();
        (data.response || []).forEach(fx => {
            const home = fx.teams.home.name, away = fx.teams.away.name;
            matches.forEach(m => {
                if (m.knockout) return;
                const [t1, t2] = m.teams;
                const e1 = teamNameMap[t1], e2 = teamNameMap[t2];
                let homeIsTeam1 = null;
                if (e1 === home && e2 === away) homeIsTeam1 = true;
                else if (e1 === away && e2 === home) homeIsTeam1 = false;
                else return;
                liveData[matchKey(m)] = {
                    status: fx.fixture.status.short,
                    elapsed: fx.fixture.status.elapsed,
                    extra: fx.fixture.status.extra,
                    goalsHome: fx.goals.home,
                    goalsAway: fx.goals.away,
                    homeIsTeam1: homeIsTeam1,
                    fixtureId: fx.fixture.id
                };
            });
        });
    } catch (e) {
        console.error('live fetch error', e);
    }
    render();
}

function pollLoop() {
    if (shouldPoll()) fetchLiveData();
    setTimeout(pollLoop, 3 * 60 * 1000); // every 3 minutes
}

// returns display info for a match based on liveData, or null if no live data / not started
function liveStatusInfo(ld, m) {
    if (!ld) return null;
    const s = ld.status;
    const g1 = ld.homeIsTeam1 ? ld.goalsHome : ld.goalsAway;
    const g2 = ld.homeIsTeam1 ? ld.goalsAway : ld.goalsHome;
    const score = (g1 !== null && g1 !== undefined) ? `${g1} - ${g2}` : '';
    if (STATUS_LIVE.includes(s)) {
        const minTxt = ld.elapsed != null ? `الدقيقة ${ld.elapsed}${ld.extra ? '+' + ld.extra : ''}` : '';
        return { cls: 'live', text: `⚽ ${score}  |  ${minTxt}`, started: true, finished: false, score };
    }
    if (STATUS_HALFTIME.includes(s)) {
        return { cls: 'live', text: `⏸ استراحة الشوط الأول  |  ${score}`, started: true, finished: false, score };
    }
    if (STATUS_SUSPENDED.includes(s)) {
        return { cls: 'suspended', text: `⏸ متوقفة الآن  |  ${score}`, started: true, finished: false, score };
    }
    if (STATUS_FINISHED.includes(s)) {
        return { cls: 'done', text: `✓ انتهت  |  ${score}`, started: true, finished: true, score };
    }
    if (s === 'PST') {
        return { cls: '', text: `⏳ تم تأجيل المباراة`, started: false, finished: false };
    }
    if (s === 'CANC' || s === 'ABD') {
        return { cls: 'done', text: `✗ ألغيت المباراة`, started: false, finished: true };
    }
    // NS / TBD / unknown -> let the time-based countdown handle it
    return null;
}

                    show = !m.knockout && info.started && !info.finished;
                } else {
                    show = !m.knockout && elapsed >= 0 && elapsed < MATCH_DURATION_MS;

                if (info && info.started) {

        let resultHtml = '<span style="color:#bbb;">—</span>';
        const ldInfo = liveStatusInfo(ld, m);

                ${lateHtml}
                <span class="countdown" data-time="${m.ast}" data-key="${isKnockout ? '' : key}"></span>
            </td>
            <td>${matchName}${lineupBtnHtml}</td>
            <td style="text-align:center;">${resultHtml}</td>
            <td class="col-group">${badge}</td>
        </tr>`;
    });
    tbody.innerHTML = html || `<tr><td colspan="4" style="text-align:center;padding:30px;color:#888;">لا توجد مباريات لهذه التصفية</td></tr>`;
    document.getElementById('resultCount').textContent = `عدد المباريات المعروضة: ${count}`;
    updateCountdowns();
}

const MATCH_DURATION_MS = 2 * 60 * 60 * 1000; // 2 hours

function updateCountdowns() {
    const now = Date.now();
    document.querySelectorAll('.countdown').forEach(el => {
        const key = el.dataset.key;
        const ld = key ? liveData[key] : null;
        const info = liveStatusInfo(ld, null);
        el.classList.remove('live', 'done', 'suspended');
        if (info) {
            if (info.cls) el.classList.add(info.cls);
            el.textContent = info.text;
            return;
        }

        const t = new Date(el.dataset.time).getTime();
        if (isNaN(t)) { el.textContent = '—'; return; }
        const diff = t - now;           // negative = started
        const elapsed = -diff;          // how long since kickoff

        if (diff > 0) {
            // upcoming — show countdown
            const totalSec = Math.floor(diff / 1000);
            const s   = totalSec % 60;
            const mn  = Math.floor(totalSec / 60) % 60;
            const h   = Math.floor(totalSec / 3600) % 24;
            const d   = Math.floor(totalSec / 86400);
            el.textContent = d > 0
                ? `${d}ي ${m2(h)}س ${m2(mn)}د ${m2(s)}ث`
                : `${m2(h)}س ${m2(mn)}د ${m2(s)}ث`;
        } else if (elapsed < MATCH_DURATION_MS) {
            // live
            el.classList.add('live');
            el.textContent = '⚽ جارية الآن';
        } else {
            // finished
            el.classList.add('done');
            el.textContent = '✓ انتهت';
        }
    });
}
function m2(n) { return n < 10 ? '0' + n : '' + n; }

async function showLineups(fixtureId, team1Name, team2Name, btn) {
    const modal = document.getElementById('lineupModal');
    if (lineupCache[fixtureId]) {
        renderLineupModal(lineupCache[fixtureId], team1Name, team2Name);
        return;
    }
    btn.disabled = true;
    btn.textContent = '⏳ تحميل...';
    try {
        const url = `https://${API_HOST}/v3/fixtures/lineups?fixture=${fixtureId}`;
        const res = await fetch(url, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST }
        });
        const data = await res.json();
        const lineups = data.response || [];
        lineupCache[fixtureId] = lineups;
        if (lineups.length === 0) {
            modal.innerHTML = `<div class="modal-overlay" onclick="closeLineupModal(event)">
                <div class="modal-box">
                    <button class="modal-close" onclick="closeLineupModal()">×</button>
                    <div class="modal-title">التشكيلة غير متوفرة بعد</div>
                    <div style="text-align:center; color:#888; font-size:0.85rem;">تُنشر التشكيلات الرسمية عادةً قبل ساعة من بداية المباراة.</div>
                </div>
            </div>`;
        } else {
            renderLineupModal(lineups, team1Name, team2Name);
        }
    } catch (e) {
        console.error('lineup fetch error', e);
        modal.innerHTML = `<div class="modal-overlay" onclick="closeLineupModal(event)">
            <div class="modal-box">
                <button class="modal-close" onclick="closeLineupModal()">×</button>
                <div class="modal-title">تعذر تحميل التشكيلة</div>
            </div>
        </div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = '📋 التشكيلة';
    }
}

function renderLineupModal(lineups, team1Name, team2Name) {
    const modal = document.getElementById('lineupModal');
    let body = '';
    lineups.forEach(team => {
        const startXI = (team.startXI || []).map(p => `<span>${p.player.number ?? ''} ${p.player.name} (${p.player.pos || ''})</span>`).join('');
        const subs = (team.substitutes || []).map(p => `<span>${p.player.number ?? ''} ${p.player.name}</span>`).join('');
        body += `<div class="lineup-team">${team.team.name}</div>
                 <div class="lineup-formation">التشكيل: ${team.formation || '—'} · المدرب: ${team.coach && team.coach.name ? team.coach.name : '—'}</div>
                 <div class="lineup-players">${startXI || '—'}</div>
                 ${subs ? `<div class="lineup-formation" style="margin-top:8px;">الاحتياط</div><div class="lineup-players">${subs}</div>` : ''}`;
    });
    modal.innerHTML = `<div class="modal-overlay" onclick="closeLineupModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeLineupModal()">×</button>
            <div class="modal-title">${team1Name} × ${team2Name}</div>
            ${body}
        </div>
    </div>`;
}

function closeLineupModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('lineupModal').innerHTML = '';
}

render();
setInterval(updateCountdowns, 1000);
setInterval(() => { if (activeLiveFilter) render(); }, 30000);
pollLoop();
loadFinalResultsCache().then(() => {
    let changed = false;
    Object.entries(seedFinalResults).forEach(([k, v]) => {
        if (!finalResults[k]) { finalResults[k] = v; changed = true; }
    });
    if (changed) saveFinalResultsCache();
    render();
    syncFinishedResults();
});
</script>
